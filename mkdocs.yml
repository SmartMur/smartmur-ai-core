site_name: SmartMur Core
site_description: Self-hosted AI operations platform — skills, scheduling, messaging, SSH, browser automation, workflows, memory, and vault.
site_url: https://smartmur.github.io/smartmur-ai-core/
repo_url: https://github.com/SmartMur/smartmur-ai-core
repo_name: SmartMur/smartmur-ai-core

theme:
  name: material
  logo: assets/smartmur-logo.svg
  favicon: assets/smartmur-logo.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.snippets
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting-started/index.md
      - Installation Guide: guides/getting-started.md
      - Deployment: guides/DEPLOYMENT.md
      - Upgrade Guide: guides/UPGRADE.md
      - Configuration: reference/CONFIGURATION.md
      - Setup Wizard: reference/setup-wizard.md
      - Cloudflare Tunnel: guides/cloudflared-setup.md
  - Guides:
      - Customization: reference/CUSTOMIZATION.md
      - Chat Integrations: reference/CHAT_INTEGRATIONS.md
      - Model Routing: reference/model-routing.md
      - Template Manager: reference/template-manager.md
      - Release Process: reference/release-process.md
      - CI/CD Pipeline: reference/ci-cd.md
  - Reference:
      - CLI Commands: reference/cli.md
      - Skills: reference/skills.md
      - Cron & Scheduling: reference/cron.md
      - Messaging: reference/messaging.md
      - SSH & Remote Execution: reference/ssh.md
      - Browser Automation: reference/browser.md
      - Workflows: reference/workflows.md
      - Memory: reference/memory.md
      - Watchers: reference/watchers.md
      - Vault & Security: reference/vault.md
      - Dashboard: reference/dashboard.md
      - Telegram Bot: reference/telegram-bot.md
      - Heartbeat Monitor: reference/heartbeat.md
      - Job Runner: reference/job-runner.md
      - Intake Pipeline: reference/intake.md
      - MCP Server: reference/mcp-server.md
