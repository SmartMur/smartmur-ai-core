<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="socialBgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:0.8" />
    </linearGradient>
    <pattern id="socialGridPattern" x="50" y="50" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#30363d" stroke-width="0.5" opacity="0.15"/>
    </pattern>
    <filter id="socialGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#socialBgGradient)"/>

  <!-- Grid pattern overlay -->
  <rect width="1280" height="640" fill="url(#socialGridPattern)"/>

  <!-- Decorative lines -->
  <line x1="0" y1="160" x2="1280" y2="160" stroke="#30363d" stroke-width="1" opacity="0.08"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#30363d" stroke-width="1" opacity="0.08"/>

  <!-- Left section: Logo -->
  <g>
    <!-- Hexagon outer -->
    <polygon points="200,160 293.2,220 293.2,340 200,400 106.8,340 106.8,220"
             fill="none" stroke="url(#hexGradient)" stroke-width="4" stroke-linejoin="round"/>

    <!-- Hexagon inner -->
    <polygon points="200,185 270,230 270,310 200,355 130,310 130,230"
             fill="none" stroke="url(#hexGradient)" stroke-width="2.5" stroke-linejoin="round" opacity="0.4"/>

    <!-- Center accent -->
    <circle cx="200" cy="280" r="16" fill="#3fb950" opacity="0.6"/>
    <circle cx="200" cy="280" r="14" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.5"/>

    <!-- Large N -->
    <text x="200" y="310"
          font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="120"
          font-weight="800"
          fill="#58a6ff"
          text-anchor="middle"
          dominant-baseline="middle"
          filter="url(#socialGlow)">N</text>
  </g>

  <!-- Center section: Title and tagline -->
  <g>
    <!-- SMARTMUR title -->
    <text x="480" y="180"
          font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="96"
          font-weight="900"
          fill="#c9d1d9"
          letter-spacing="4"
          filter="url(#socialGlow)">SMARTMUR</text>

    <!-- Subtitle -->
    <text x="480" y="270"
          font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="32"
          font-weight="600"
          fill="#58a6ff">Sovereign AI Operations</text>

    <!-- Tagline -->
    <text x="480" y="320"
          font-family="'SF Mono', Monaco, 'Cascadia Code', monospace"
          font-size="22"
          font-weight="500"
          fill="#3fb950">Your infrastructure, your AI, your rules.</text>

    <!-- Accent bar -->
    <rect x="480" y="345" width="300" height="3" fill="#3fb950" opacity="0.7"/>
  </g>

  <!-- Right section: Features -->
  <g>
    <!-- Feature grid -->
    <text x="850" y="160"
          font-family="'SF Mono', Monaco, 'Cascadia Code', monospace"
          font-size="14"
          font-weight="600"
          fill="#8b949e"
          letter-spacing="1">CAPABILITIES</text>

    <!-- Feature items - Column 1 -->
    <circle cx="870" cy="215" r="4" fill="#3fb950" opacity="0.8"/>
    <text x="895" y="222"
          font-family="'SF Mono', Monaco, 'Cascadia Code', monospace"
          font-size="16"
          font-weight="500"
          fill="#c9d1d9">Skills</text>

    <circle cx="870" cy="270" r="4" fill="#3fb950" opacity="0.8"/>
    <text x="895" y="277"
          font-family="'SF Mono', Monaco, 'Cascadia Code', monospace"
          font-size="16"
          font-weight="500"
          fill="#c9d1d9">Cron</text>

    <circle cx="870" cy="325" r="4" fill="#3fb950" opacity="0.8"/>
    <text x="895" y="332"
          font-family="'SF Mono', Monaco, 'Cascadia Code', monospace"
          font-size="16"
          font-weight="500"
          fill="#c9d1d9">SSH</text>

    <circle cx="870" cy="380" r="4" fill="#3fb950" opacity="0.8"/>
    <text x="895" y="387"
          font-family="'SF Mono', Monaco, 'Cascadia Code', monospace"
          font-size="16"
          font-weight="500"
          fill="#c9d1d9">Browser</text>

    <!-- Feature items - Column 2 -->
    <circle cx="1070" cy="215" r="4" fill="#58a6ff" opacity="0.8"/>
    <text x="1095" y="222"
          font-family="'SF Mono', Monaco, 'Cascadia Code', monospace"
          font-size="16"
          font-weight="500"
          fill="#c9d1d9">Messaging</text>

    <circle cx="1070" cy="270" r="4" fill="#58a6ff" opacity="0.8"/>
    <text x="1095" y="277"
          font-family="'SF Mono', Monaco, 'Cascadia Code', monospace"
          font-size="16"
          font-weight="500"
          fill="#c9d1d9">Workflows</text>

    <circle cx="1070" cy="325" r="4" fill="#58a6ff" opacity="0.8"/>
    <text x="1095" y="332"
          font-family="'SF Mono', Monaco, 'Cascadia Code', monospace"
          font-size="16"
          font-weight="500"
          fill="#c9d1d9">Memory</text>

    <circle cx="1070" cy="380" r="4" fill="#58a6ff" opacity="0.8"/>
    <text x="1095" y="387"
          font-family="'SF Mono', Monaco, 'Cascadia Code', monospace"
          font-size="16"
          font-weight="500"
          fill="#c9d1d9">Vault</text>
  </g>

  <!-- Bottom accent section -->
  <g opacity="0.5">
    <line x1="100" y1="560" x2="1180" y2="560" stroke="#3fb950" stroke-width="1"/>
    <circle cx="120" cy="560" r="3" fill="#3fb950"/>
    <circle cx="1160" cy="560" r="3" fill="#3fb950"/>
  </g>

  <!-- Footer text -->
  <text x="640" y="610"
        font-family="'SF Mono', Monaco, 'Cascadia Code', monospace"
        font-size="14"
        font-weight="400"
        fill="#6e7681"
        text-anchor="middle">Orchestrate • Automate • Control Your Infrastructure</text>
</svg>
