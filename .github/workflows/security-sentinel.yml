name: Security Sentinel

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  security-scan:
    name: Security Sentinel Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install pyyaml requests
          pip install -e ".[dev]" || true

      - name: Run Security Sentinel
        id: scan
        run: |
          python skills/security-sentinel/run.py \
            --format json \
            --output security-report.json \
            --project-root . || echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Generate Markdown report
        if: always()
        run: |
          python skills/security-sentinel/run.py \
            --format markdown \
            --output security-report.md \
            --project-root . || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: |
            security-report.json
            security-report.md

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('security-report.json')) return;
            const report = JSON.parse(fs.readFileSync('security-report.json', 'utf8'));
            const findings = report.findings || [];
            const critical = findings.filter(f => f.severity === 'CRITICAL');
            const high = findings.filter(f => f.severity === 'HIGH');
            const medium = findings.filter(f => f.severity === 'MEDIUM');
            if (findings.length === 0) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '## Security Sentinel\n\nAll clear — no findings.'
              });
              return;
            }
            const lines = findings.slice(0, 25).map(f =>
              `| ${f.severity} | ${f.title} | \`${f.file || '-'}\` | ${f.description.slice(0, 120)} |`
            );
            const body = [
              '## Security Sentinel Report',
              '',
              `| Severity | Count |`,
              `|----------|-------|`,
              `| CRITICAL | ${critical.length} |`,
              `| HIGH | ${high.length} |`,
              `| MEDIUM | ${medium.length} |`,
              '',
              '| Severity | Finding | File | Details |',
              '|----------|---------|------|---------|',
              ...lines,
              '',
              findings.length > 25 ? `_...and ${findings.length - 25} more._` : '',
              critical.length > 0 ? '**This PR is blocked by CRITICAL findings.**' : '',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail on critical
        if: always()
        run: |
          if [ -f security-report.json ]; then
            CRITS=$(python3 -c "import json; r=json.load(open('security-report.json')); print(sum(1 for f in r.get('findings',[]) if f['severity']=='CRITICAL'))")
            if [ "$CRITS" -gt 0 ]; then
              echo "::error::Security Sentinel found $CRITS CRITICAL findings"
              exit 2
            fi
          fi
