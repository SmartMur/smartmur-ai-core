<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claw Dashboard - Login</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-card: #16213e;
      --border: #2a2a4a;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0b0;
      --text-muted: #606080;
      --accent: #00d4ff;
      --accent-dim: #00a0cc;
      --red: #ff5252;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 380px;
      max-width: 90vw;
    }
    .login-brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-brand h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 2px;
    }
    .login-brand p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: 4px;
    }
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
    }
    .form-input:focus { outline: none; border-color: var(--accent); }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-login:hover { background: var(--accent-dim); }
    .error-msg {
      color: var(--red);
      font-size: 14px;
      text-align: center;
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-brand">
      <h1>CLAW</h1>
      <p>Dashboard Login</p>
    </div>
    <div id="error" class="error-msg"></div>
    <form id="loginForm" onsubmit="return doLogin(event)">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" id="username" name="username" type="text" autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" id="password" name="password" type="password" autocomplete="current-password">
      </div>
      <button class="btn-login" type="submit">Sign In</button>
    </form>
  </div>
  <script>
    async function doLogin(e) {
      e.preventDefault();
      const errEl = document.getElementById('error');
      errEl.classList.remove('visible');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) {
        errEl.textContent = 'Username and password required';
        errEl.classList.add('visible');
        return false;
      }
      try {
        const resp = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await resp.json();
        if (data.ok) {
          sessionStorage.setItem('claw_user', username);
          window.location.href = '/';
        } else {
          errEl.textContent = data.error || 'Login failed';
          errEl.classList.add('visible');
        }
      } catch (err) {
        errEl.textContent = 'Connection error';
        errEl.classList.add('visible');
      }
      return false;
    }
  </script>
</body>
</html>
